name: Ping
options:
  bundleIdPrefix: com.personal
  developmentTeam: ${DEVELOPMENT_TEAM}
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  minimumXcodeGenVersion: "2.40"

targets:
  Ping:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Ping
        excludes:
          - "**/.DS_Store"
    info:
      path: Ping/Info.plist
      properties:
        CFBundleDisplayName: Ping
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        NSContactsUsageDescription: "Ping uses your contacts to help you keep in touch with people."
        NSLocationWhenInUseUsageDescription: "Ping uses your location to show contacts near you."
        NSCalendarsFullAccessUsageDescription: "Ping syncs check-in reminders to your calendar."
        NSCalendarsUsageDescription: "Ping syncs check-in reminders to your calendar."
    settings:
      base:
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.ping
        CODE_SIGN_ENTITLEMENTS: Ping/Ping.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
